<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keycloak Universal Auth — Vanilla JS</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --primary: #3b82f6;
      --danger: #ef4444;
      --success: #22c55e;
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 2rem;
      min-width: 400px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }

    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    .status { margin: 1rem 0; padding: 0.75rem; border-radius: var(--radius); }
    .status.authenticated { background: rgba(34, 197, 94, 0.15); border: 1px solid var(--success); }
    .status.unauthenticated { background: rgba(239, 68, 68, 0.15); border: 1px solid var(--danger); }

    .user-info { margin: 1rem 0; }
    .user-info p { margin: 0.25rem 0; font-size: 0.9rem; opacity: 0.8; }

    .actions { display: flex; gap: 0.5rem; margin-top: 1rem; }

    button {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .btn-login { background: var(--primary); color: white; }
    .btn-logout { background: var(--danger); color: white; }
    .btn-register { background: var(--success); color: white; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔐 Keycloak Universal Auth</h1>
    <p style="opacity: 0.6; font-size: 0.85rem;">Exemplo Vanilla JS</p>

    <div id="status" class="status unauthenticated">
      Carregando...
    </div>

    <div id="user-info" class="user-info" style="display: none;"></div>

    <div class="actions">
      <button id="btn-login" class="btn-login" style="display: none;">Entrar</button>
      <button id="btn-register" class="btn-register" style="display: none;">Registrar</button>
      <button id="btn-logout" class="btn-logout" style="display: none;">Sair</button>
    </div>
  </div>

  <script type="module">
    // Para usar via npm: import { KeycloakAuth } from 'keycloak-universal-auth';
    // Para desenvolvimento local:
    import { KeycloakAuth } from '../../src/index.ts';

    const auth = new KeycloakAuth({
      url: 'http://localhost:8080',
      realm: 'meu-realm',
      clientId: 'meu-app',
      initOptions: {
        onLoad: 'check-sso',
        pkceMethod: 'S256',
      },
    });

    const statusEl = document.getElementById('status');
    const userInfoEl = document.getElementById('user-info');
    const btnLogin = document.getElementById('btn-login');
    const btnRegister = document.getElementById('btn-register');
    const btnLogout = document.getElementById('btn-logout');

    function updateUI(state) {
      if (!state.initialized) {
        statusEl.textContent = 'Inicializando...';
        return;
      }

      if (state.authenticated) {
        statusEl.className = 'status authenticated';
        statusEl.textContent = '✅ Autenticado';

        btnLogin.style.display = 'none';
        btnRegister.style.display = 'none';
        btnLogout.style.display = 'block';

        if (state.userProfile) {
          userInfoEl.style.display = 'block';
          userInfoEl.innerHTML = `
            <p><strong>Nome:</strong> ${state.userProfile.firstName ?? ''} ${state.userProfile.lastName ?? ''}</p>
            <p><strong>Email:</strong> ${state.userProfile.email ?? 'N/A'}</p>
            <p><strong>Roles:</strong> ${state.roles.join(', ') || 'nenhuma'}</p>
          `;
        }
      } else {
        statusEl.className = 'status unauthenticated';
        statusEl.textContent = '❌ Não autenticado';

        btnLogin.style.display = 'block';
        btnRegister.style.display = 'block';
        btnLogout.style.display = 'none';
        userInfoEl.style.display = 'none';
      }
    }

    auth.onStateChange(updateUI);

    btnLogin.addEventListener('click', () => auth.login());
    btnRegister.addEventListener('click', () => auth.register());
    btnLogout.addEventListener('click', () => auth.logout());

    auth.init().catch((error) => {
      statusEl.className = 'status unauthenticated';
      statusEl.textContent = `Erro: ${error.message}`;
      btnLogin.style.display = 'block';
    });
  </script>
</body>
</html>
